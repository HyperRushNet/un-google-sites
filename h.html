<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #d4d4d4;
            --text-muted: #a3a3a3;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: #6e6e6e;
            z-index: 9999;
        }
        .bg {
            position: fixed;
            inset: -20px;
            z-index: -1;
            background: url('https://wallpapers.com/images/hd/mythical-1920-x-1080-background-ghfuhrbjpnyy19ut.jpg') center/cover no-repeat fixed;
            opacity: 0.5;
            filter: blur(10px);
        }
        .top-fade {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: linear-gradient(to bottom, rgba(10,10,10,0.9), transparent);
            pointer-events: none;
            z-index: 1;
        }
        .content {
            text-align: center;
            max-width: 500px;
            position: relative;
            z-index: 2;
        }
        .title {
            font-family: 'Bungee', cursive;
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            color: #b8b8b8;
            letter-spacing: 0.06em;
            margin-bottom: 18px;
            font-weight: normal;
        }
        .desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.75;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="top-fade"></div>
    
    <div class="content">
        <h1 class="title">The Unblocked Network</h1>
        <p class="desc">Founded by an anonymous creator, this network provides access to game site links, bookmarklets, and a massive collection of unblocked games.</p>
    </div>
</body>
</html>
