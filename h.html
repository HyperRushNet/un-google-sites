<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"><style>:root{--bg:#0a0a0a;--text:#e5e5e5;--text-muted:#6b6b6b}*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{font-family:Outfit,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:24px}body::before{content:'';position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#4a4a4a,transparent);z-index:9999}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:10px}.bg{position:fixed;inset:-20px;z-index:-1;background:url(https://wallpapers.com/images/hd/mythical-1920-x-1080-background-ghfuhrbjpnyy19ut.jpg) center/cover no-repeat fixed;opacity:0.4;filter:blur(12px)}.top-fade{position:fixed;top:0;left:0;right:0;height:200px;background:linear-gradient(180deg,rgba(10,10,10,0.9),transparent);pointer-events:none;z-index:1}.content{text-align:center;max-width:480px;position:relative;z-index:2;animation:fadeUp 0.6s ease}.title{font-size:clamp(1.3rem,3.5vw,1.7rem);color:#c8c8c8;letter-spacing:0.08em;margin-bottom:20px;font-weight:500}.desc{color:var(--text-muted);font-size:0.95rem;line-height:1.8;font-weight:300}@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}</style></head><body><div class="bg"></div><div class="top-fade"></div><div class="content"><h1 class="title">The Unblocked Network</h1><p class="desc">Founded by an anonymous creator, this network provides access to game site links, bookmarklets, and a massive collection of unblocked games.</p></div></body></html>
