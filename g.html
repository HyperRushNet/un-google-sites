<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0a0a0a;--card-bg:rgba(10,10,10,0.4);--card-hover:rgba(20,20,20,0.5);--text:#e5e5e5;--text-muted:#737373;--border:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.18)}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:1px;background:#6e6e6e;z-index:100}
        .bg{position:fixed;inset:-20px;z-index:-1;background:url('https://wallpapers.com/images/hd/mythical-1920-x-1080-background-ghfuhrbjpnyy19ut.jpg') center/cover no-repeat fixed;opacity:0.5;filter:blur(0px)}
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:#333;border-radius:10px}
        .container{max-width:1200px;margin:0 auto;padding:0 24px;position:relative;z-index:2}
        header{padding:30px 0 20px}
        main{padding-bottom:80px}
        .search-wrap{width:100%;position:relative}
        input{width:100%;padding:14px 18px 14px 44px;background:rgba(0,0,0,0.25);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:12px;color:#fff;font-family:inherit;font-size:1rem;outline:none;transition:all .2s}
        input:focus{border-color:rgba(255,255,255,0.2);background:rgba(0,0,0,0.2)}
        input::placeholder{color:var(--text-muted)}
        .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;transition:color .2s}
        input:focus+.search-icon{color:#fff}
        #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;margin-top:16px}
        .card{background:var(--card-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:12px;padding:28px 15px;text-align:center;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;justify-content:center;min-height:90px}
        .card:hover{background:var(--card-hover);border-color:var(--border-hover);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
        .name{font-size:.9rem;font-weight:500;color:#d4d4d4}
        .empty{grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)}
        footer{font-family:'Outfit',sans-serif;text-align:center;padding:20px;color:#333;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em}
        @media(max-width:600px){header{padding:24px 0 16px}#grid{grid-template-columns:repeat(2,1fr);gap:12px}.card{padding:20px 10px}}
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <header>
            <div class="search-wrap">
                <input type="text" id="s" placeholder="Search games..." autocomplete="off" autofocus>
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
        </header>
        <main>
            <div id="grid"></div>
        </main>
        <footer>AD FREE & UNBLOCKED</footer>
    </div>
    <script>
        const COMMIT='e42b5d828c97606b4b85ee1033dcbd58a683116a',B=`https://cdn.jsdelivr.net/gh/HyperRushNet/c6xc@${COMMIT}/`,J=B+'game-data.json',g=document.getElementById('grid'),s=document.getElementById('s');let D=[];const esc=str=>{const d=document.createElement('div');d.textContent=str;return d.innerHTML};async function init(){try{g.innerHTML='<div class="loader"></div>';const r=await fetch(J);if(!r.ok)throw new Error();D=await r.json();D.sort((a,b)=>a.name.localeCompare(b.name));render(D)}catch(e){g.innerHTML='<div class="empty">Error loading games.</div>'}}function render(d){if(!d.length){g.innerHTML='<div class="empty">No results found.</div>';return}g.innerHTML=d.map((i,idx)=>`<div class="card" onclick="run('${i.path}')" tabindex="0" style="animation-delay:${idx*15}ms"><span class="name">${esc(i.name)}</span></div>`).join('')}async function run(p){try{const url=B+p+'/index.html',response=await fetch(url),htmlContent=await response.text(),win=window.open('about:blank','_blank');if(win){win.document.write(htmlContent);win.document.close()}else{alert('Popup blocked')}}catch(e){alert('Error loading game')}}s.addEventListener('input',e=>{render(D.filter(i=>i.name.toLowerCase().includes(e.target.value.toLowerCase().trim())))});g.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.classList.contains('card'))e.target.click()});init();
    </script>
</body>
</html>
