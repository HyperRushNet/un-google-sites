<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"><style>:root{--bg:#050505;--card-bg:rgba(15,15,15,0.8);--card-hover:rgba(30,30,30,0.9);--text:#e5e5e5;--text-muted:#525252;--border:rgba(255,255,255,0.05);--accent:#818cf8}*{box-sizing:border-box;margin:0;padding:0}::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:#0a0a0a}::-webkit-scrollbar-thumb{background:#222;border-radius:10px;border:2px solid #0a0a0a}::-webkit-scrollbar-thumb:hover{background:#333}body{font-family:Outfit,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}.bg{position:fixed;inset:-20px;z-index:-1;background:url(https://wallpapers.com/images/hd/mythical-1920-x-1080-background-ghfuhrbjpnyy19ut.jpg) center/cover no-repeat fixed;opacity:0.3;filter:blur(15px)}.container{max-width:1200px;margin:0 auto;padding:0 24px;position:relative;z-index:2}header{padding:32px 0 24px}.search-wrap{position:relative}input{width:100%;padding:16px 20px 16px 48px;background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:12px;color:#fff;font-family:inherit;outline:none;transition:0.25s}input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(129,140,248,0.2)}#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;margin-top:20px}.card{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;transition:all 0.25s ease;display:flex;align-items:center;justify-content:center;min-height:88px;opacity:0;transform:translateY(10px)}.card.visible{animation:fadeUp 0.4s ease forwards}.card.hidden{display:none}.name{font-size:0.88rem;font-weight:500;color:#ccc}footer{text-align:center;padding:40px;color:#222;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.2em}@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}</style></head><body><div class="bg"></div><div class="container"><header><div class="search-wrap"><input id="s" placeholder="Search games..."><svg style="position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div></header><main id="grid"></main><footer>AD FREE & UNBLOCKED</footer></div><script>const COMMIT="e42b5d828c97606b4b85ee1033dcbd58a683116a",BASE=`https://cdn.jsdelivr.net/gh/HyperRushNet/c6xc@${COMMIT}/`,grid=document.getElementById("grid"),obs=new IntersectionObserver(e=>{e.forEach(e=>{e.isIntersecting&&e.target.classList.add("visible")})},{threshold:.1});let games=[];async function init(){try{const e=await fetch(BASE+"game-data.json");games=await e.json(),render()}catch(e){}}function render(){grid.innerHTML=games.sort((e,t)=>e.name.localeCompare(t.name)).map(e=>`<div class="card" onclick="run('${e.path}')"><span class="name">${e.name}</span></div>`).join(""),document.querySelectorAll(".card").forEach(e=>obs.observe(e))}function run(e){const t=window.open("about:blank");fetch(BASE+e+"/index.html").then(e=>e.text()).then(e=>{t.document.write(e),t.document.close()})}document.getElementById("s").addEventListener("input",e=>{const t=e.target.value.toLowerCase();document.querySelectorAll(".card").forEach(e=>{const n=e.textContent.toLowerCase().includes(t);e.classList.toggle("hidden",!n),n&&obs.observe(e)})}),init();</script></body></html>
