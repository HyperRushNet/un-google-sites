<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"><style>:root{--bg:#050505;--card-bg:rgba(15,15,15,0.95);--card-hover:rgba(30,30,30,1);--text:#e5e5e5;--text-muted:#525252;--border:rgba(255,255,255,0.08);--accent:#444}*{box-sizing:border-box;margin:0;padding:0}::-webkit-scrollbar{display:none}body{font-family:Outfit,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-top:1px;-ms-overflow-style:none;scrollbar-width:none}body::before{content:"";position:fixed;top:0;left:0;right:0;height:1px;background:#333;z-index:9999}.bg{position:fixed;inset:0;z-index:-1;background:url(https://wallpapers.com/images/hd/mythical-1920-x-1080-background-ghfuhrbjpnyy19ut.jpg) center/cover no-repeat fixed;opacity:.3}.container{max-width:1200px;margin:0 auto;padding:0 16px;position:relative;z-index:2}header{padding:24px 0}.search-wrap{position:relative;width:100%;margin:0}input{width:100%;padding:14px 20px 14px 48px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;color:#fff;font-family:inherit;font-size:1rem;outline:0;transition:.2s}input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(255,255,255,.05)}#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:20px;padding-bottom:40px}.card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:20px 12px;text-align:center;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;justify-content:center;min-height:100px;opacity:0;transform:translateY(10px);user-select:none}.card.visible{animation:fadeUp .4s ease forwards}.card.hidden{display:none}.name{font-size:.85rem;font-weight:500;color:#ccc;line-height:1.2;word-break:break-word}footer{text-align:center;padding:30px;color:var(--text-muted);font-size:.65rem;text-transform:uppercase;letter-spacing:.2em}@media (hover:hover){.card:hover{border-color:var(--accent);background:var(--card-hover);transform:translateY(-4px)}}@media (max-width:480px){#grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}.card{min-height:80px;padding:15px 8px}.name{font-size:.75rem}}@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}</style></head><body><div class="bg"></div><div class="container"><header><div class="search-wrap"><input id="s" placeholder="Search games..." autocomplete="off"><svg style="position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div></header><main id="grid"></main><footer>AD FREE & UNBLOCKED</footer></div><script>const COMMIT="e42b5d828c97606b4b85ee1033dcbd58a683116a",BASE=`https://cdn.jsdelivr.net/gh/HyperRushNet/c6xc@${COMMIT}/`,grid=document.getElementById("grid"),obs=new IntersectionObserver(e=>{e.forEach(e=>{e.isIntersecting&&e.target.classList.add("visible")})},{threshold:.05});let games=[];async function init(){try{const e=await fetch(BASE+"game-data.json");games=await e.json(),render()}catch(e){console.error(e)}}function render(){grid.innerHTML=games.sort((e,t)=>e.name.localeCompare(t.name)).map(e=>`<div class="card" onclick="run('${e.path}')"><span class="name">${e.name}</span></div>`).join(""),document.querySelectorAll(".card").forEach(e=>obs.observe(e))}function run(e){const t=window.open();if(!t)return alert("Allow popups");fetch(BASE+e+"/index.html").then(e=>e.text()).then(e=>{t.document.write(e),t.document.close()}).catch(e=>t.close())}document.getElementById("s").addEventListener("input",e=>{const t=e.target.value.toLowerCase();document.querySelectorAll(".card").forEach(e=>{const n=e.textContent.toLowerCase().includes(t);e.classList.toggle("hidden",!n),n&&(e.classList.remove("visible"),obs.observe(e))})}),init();</script></body></html>
