<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0a0a0a;--card-bg:rgba(20,20,20,0.6);--card-hover:rgba(40,40,40,0.6);--text:#e5e5e5;--text-muted:#737373;--border:hsla(0,0%,100%,0.08);--accent:#818cf8}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Outfit,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column}body::before{content:'';position:fixed;top:0;left:0;right:0;height:1px;background:#6e6e6e;z-index:9999}.bg{inset:-20px;z-index:-1;background:url(https://wallpapers.com/images/hd/dark-gaming-1920-x-1200-wallpaper-tkusf3ukacvbbldd.jpg) 50%/cover no-repeat fixed;opacity:.5;filter:blur(8px)}.bg,.top-fade{position:fixed}.top-fade{top:0;left:0;right:0;height:140px;background:linear-gradient(180deg,#000,transparent);pointer-events:none;z-index:1}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:10px}.container{max-width:900px;width:100%;margin:0 auto;padding:0 24px;position:relative;z-index:2;display:flex;flex-direction:column;justify-content:center;flex-grow:1}main{padding:80px 0;width:100%}#bookmarklets-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;width:100%}.bookmark-card{background:var(--card-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:16px;padding:40px 20px;display:flex;align-items:center;justify-content:center;transition:all .3s cubic-bezier(.4,0,.2,1);text-decoration:none;cursor:grab;min-height:100px;font-weight:600;font-size:1.1rem;color:#fff}.bookmark-card:hover{background:var(--card-hover);border-color:hsla(0,0%,100%,.2);transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,0,0,.3)}.bookmark-card:active{cursor:grabbing}.info-corner{position:fixed;bottom:20px;right:20px;text-align:right;z-index:10;max-width:200px;pointer-events:none}.info-corner p{font-size:.75rem;color:var(--text-muted);line-height:1.4;opacity:.8}footer{text-align:center;padding:20px;color:#404040;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;opacity:.5;margin-top:auto}@media(max-width:600px){#bookmarklets-list{grid-template-columns:1fr}.info-corner{display:none}}
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="top-fade"></div>

    <div class="container">
        <main>
            <div id="bookmarklets-list">
                <a class="bookmark-card" title="Fills your browser history with 1000 entries." href="javascript:(function(){var num=1000,i=1,x=window.location.href;function addEntry(){if(i<=num){history.pushState(0,0,i==num?x:i.toString());i++;setTimeout(addEntry,10);}else{alert('Done.');}}addEntry();})();">History Flooder</a>
                <a class="bookmark-card" title="Inverts page colors for a dark theme." href="javascript:(function(){function invert(o,t){var r=o.split('('),n=r[1].split(')')[0].split(',');return n.forEach(function(o,r){r<3&&(n[r]='color'==t&&255-parseInt(o)<50?120:255-parseInt(o))}),n=n.join(','),r[0]+'('+n+')'}document.querySelectorAll('*:not([invTouch])').forEach(function(o){var t=window.getComputedStyle(o);o.style.backgroundColor=invert(t.backgroundColor,'back'),o.style.color=invert(t.color,'color'),o.setAttribute('invTouch','true')});})();">Dark Mode</a>
                <a class="bookmark-card" title="Renames tab to 'Google' and changes icon." href="javascript:(function(){var link=document.querySelector('link[rel*=\'icon\']')||document.createElement('link');link.type='image/x-icon';link.rel='shortcut icon';link.href='https://google.com/favicon.ico';document.getElementsByTagName('head')[0].appendChild(link);document.title='Google';})();">Tab Disguiser</a>
            </div>
        </main>
        <footer>The Unblocked Network</footer>
    </div>

    <div class="info-corner">
        <p><strong>How to use:</strong><br>Drag a button to your bookmarks bar. Hover for info.</p>
    </div>
</body>
</html>
