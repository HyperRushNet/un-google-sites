<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0a0a0a;--card-bg:rgba(18,18,18,0.7);--card-hover:rgba(32,32,32,0.8);--text:#e5e5e5;--text-muted:#6b6b6b;--border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.12);--accent:#818cf8;--error:#ef4444}*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{font-family:Outfit,sans-serif;background:#0a0a0a url(https://wallpapers.com/images/hd/mythical-1920-x-1080-background-ghfuhrbjpnyy19ut.jpg) center/cover no-repeat fixed;color:var(--text);min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column}body::before{content:'';position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#4a4a4a,transparent);z-index:9999}body::after{content:'';position:fixed;inset:0;background:rgba(10,10,10,0.35);z-index:-1}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:10px}::-webkit-scrollbar-thumb:hover{background:#3a3a3a}.top-fade{position:fixed;top:0;left:0;right:0;height:160px;background:linear-gradient(180deg,rgba(10,10,10,0.8),transparent);pointer-events:none;z-index:1}.container{max-width:900px;width:100%;margin:0 auto;padding:0 24px;position:relative;z-index:2;display:flex;flex-direction:column;justify-content:center;flex-grow:1}main{padding:50px 0 100px;width:100%}#lock-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:opacity 0.3s ease}.lock-box{background:rgba(18,18,18,0.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:18px;padding:44px;width:90%;max-width:360px;text-align:center}.lock-title{font-size:1.15rem;color:#fff;font-weight:500;margin-bottom:28px}.pin-input{width:100%;padding:16px 20px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:12px;font-family:inherit;font-size:1.1rem;text-align:center;letter-spacing:10px;color:#fff;outline:none;transition:border-color 0.2s}.pin-input:focus{border-color:var(--accent)}.pin-input::placeholder{color:var(--text-muted);letter-spacing:2px}.error-msg{color:var(--error);font-size:0.82rem;margin-top:16px;opacity:0;transition:opacity 0.2s;height:20px}.error-msg.show{opacity:1}@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-6px)}20%,40%,60%,80%{transform:translateX(6px)}}.shake{animation:shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97) both}#main-content{display:none}#links-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;justify-items:center;width:100%}.link-card{background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:14px;padding:28px 24px;width:100%;min-height:130px;display:flex;align-items:center;justify-content:center;transition:all 0.25s ease;cursor:pointer;text-decoration:none;position:relative;overflow:hidden}.link-card:hover{background:var(--card-hover);border-color:var(--border-hover);transform:translateY(-3px)}.link-info{display:flex;flex-direction:column;gap:8px;width:100%;text-align:center}.link-name{font-weight:600;font-size:1.05rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.link-url{font-size:0.78rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.2s}.link-card:hover .link-url{color:var(--accent)}footer{text-align:center;padding:20px;color:#3a3a3a;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.15em;margin-top:auto;position:relative;z-index:2}@media(max-width:600px){#links-list{grid-template-columns:1fr}.lock-box{padding:32px 28px}}</style></head><body><div class="top-fade"></div><div id="lock-screen"><div class="lock-box"><div class="lock-title">Enter PIN to Access</div><input type="password" id="pin-input" class="pin-input" maxlength="10" autocomplete="off" autofocus placeholder="····"><div id="error" class="error-msg">Incorrect PIN</div></div></div><div class="container" id="main-content"><main><div id="links-list"></div></main><footer>The Unblocked Network</footer></div><script>(function(){const LINKS=[{name:"Classroom G'+",url:"https://sites.google.com/view/drive-u-7-home-10"},{name:"Classroom 6x",url:"https://sites.google.com/view/classroom6x"},{name:"Classroom Games",url:"https://dnrweqffuwjtx.cloudfront.net/new-games"},{name:"FAF Games",url:"https://faf-game.github.io"}];const VALID_HASH='c2c2cbd7d05c03ab560138b5633fd4058c92247fad26e23accfc3e4eefa52c58';const lockScreen=document.getElementById('lock-screen');const mainContent=document.getElementById('main-content');const pinInput=document.getElementById('pin-input');const errorMsg=document.getElementById('error');const linksList=document.getElementById('links-list');const escapeHTML=str=>{const div=document.createElement('div');div.textContent=str;return div.innerHTML};const sha256=async str=>{const buffer=new TextEncoder().encode(str);const hash=await crypto.subtle.digest('SHA-256',buffer);return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('')};const checkPin=async e=>{if(e.type==='keydown'&&e.key!=='Enter')return;const val=pinInput.value;if(val.length<4)return;const hash=await sha256(val);if(hash===VALID_HASH){lockScreen.style.opacity='0';setTimeout(()=>{lockScreen.style.display='none';mainContent.style.display='flex';renderLinks()},300)}else{errorMsg.classList.add('show');pinInput.classList.add('shake');setTimeout(()=>pinInput.classList.remove('shake'),400);setTimeout(()=>errorMsg.classList.remove('show'),2000);pinInput.value=''}};const renderLinks=()=>{linksList.innerHTML=LINKS.map(link=>`<div class="link-card" onclick="window.open('${link.url}','_blank')"><div class="link-info"><span class="link-name">${escapeHTML(link.name)}</span><span class="link-url">${escapeHTML(link.url)}</span></div></div>`).join('')};pinInput.addEventListener('input',checkPin);pinInput.addEventListener('keydown',checkPin)})();</script></body></html>
